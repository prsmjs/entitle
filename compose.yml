services:
  postgres:
    image: postgres:16-alpine
    container_name: entitle-postgres
    platform: linux/amd64
    environment:
      POSTGRES_DB: entitle_test
      POSTGRES_USER: entitle
      POSTGRES_PASSWORD: entitle_password
    ports:
      - "5432:5432"
    volumes:
      - entitle-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entitle -d entitle_test"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  entitle-postgres-data:
